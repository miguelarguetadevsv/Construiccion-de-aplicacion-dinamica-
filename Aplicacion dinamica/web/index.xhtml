<?xml version='1.0' encoding='UTF-8' ?>

<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>Sistema de Gestión de Maderas</title>
</h:head>

<h:body>

    <h:form>

        <p:panel header=" Sistema de Gestión de Maderas"
                 style="width:90%; margin:auto;">

            <p:commandButton
                value="Cargar Maderas"
                icon="ui-icon-folder-open"
                action="#{MaderaBean.cargarMaderas}"
                update="tabla"/>

            <br/><br/>

            <p:dataTable id="tabla"
                         value="#{MaderaBean.listaMaderas}"
                         var="m"
                         paginator="true"
                         rows="5"
                         filteredValue="#{MaderaBean.maderasFiltradas}"
                         emptyMessage="No hay registros">

                <p:column headerText="ID"
                          filterBy="#{m.id}"
                          filterMatchMode="contains">
                    #{m.id}
                </p:column>

                <p:column headerText="Nombre"
                          filterBy="#{m.nombre}"
                          filterMatchMode="contains">
                    #{m.nombre}
                </p:column>

                <p:column headerText="Tipo"
                          filterBy="#{m.tipo}"
                          filterMatchMode="contains">
                    #{m.tipo}
                </p:column>

                <p:column headerText="Color">
                    #{m.color}
                </p:column>

                <p:column headerText="Precio"
                          filterBy="#{m.precio}">
                    $#{m.precio}
                </p:column>

                <p:column headerText="Disponible"
                          filterBy="#{m.disponible}"
                          filterMatchMode="exact">

                    <h:outputText
                        value="#{m.disponible ? 'Sí' : 'No'}"/>
                </p:column>

            </p:dataTable>

        </p:panel>

    </h:form>

</h:body>
</html>
